<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
    <!-- =============================================
    ✅ SEO - METADATOS BÁSICOS
    Google lee esto para decidir cómo posicionarte.
    IMPORTANTE: Cambia "tudominio.com" por tu URL real.
    ============================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- TÍTULO: Lo que sale en la pestaña del navegador y en Google.
         Máximo 60 caracteres. Incluir palabra clave principal. -->
    <title>Ahorro en Oro Físico desde 25€/mes | España 2026</title>
    
    <!-- DESCRIPCIÓN: Lo que sale debajo del título en Google.
         Máximo 155 caracteres. Debe "vender" el clic. -->
    <meta name="description" content="Ahorra en oro físico desde 25€/mes. Lingotes reales a tu nombre en Zúrich. +144% en 5 años. Sin permanencia. +200.000 inversores en 134 países.">
    
    <!-- KEYWORDS: Palabras por las que quieres aparecer en Google -->
    <meta name="keywords" content="ahorro oro físico, comprar oro España, plan ahorro oro, lingotes oro inversión, oro sin IVA, AUVESTA España, proteger dinero inflación">
    
    <!-- ROBOTS: index=Google te indexa, follow=sigue tus enlaces -->
    <meta name="robots" content="index, follow">
    
    <!-- CANONICAL: Tu URL principal (evita duplicados) -->
    <link rel="canonical" href="https://tudominio.com/">
    
    <!-- AUTOR -->
    <meta name="author" content="OroParaTuFuturo">

    <!-- =============================================
    ✅ SEO - OPEN GRAPH (Redes sociales)
    Controla cómo se ve tu web cuando alguien la comparte
    en Facebook, WhatsApp, LinkedIn, Telegram, etc.
    ============================================== -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Ahorra en Oro Físico desde 25€/mes">
    <meta property="og:description" content="El oro ha subido +144% en 5 años. Protege tu patrimonio con lingotes reales a tu nombre. Empresa alemana, +200.000 inversores.">
    <meta property="og:url" content="https://tudominio.com/">
    <meta property="og:site_name" content="OroParaTuFuturo">
    <meta property="og:locale" content="es_ES">
    <meta property="og:image" content="https://tudominio.com/img/og-share.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Ahorro en oro físico desde 25 euros al mes">

    <!-- =============================================
    ✅ SEO - TWITTER/X CARD
    ============================================== -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ahorra en Oro Físico desde 25€/mes">
    <meta name="twitter:description" content="El oro ha subido +144% en 5 años. Lingotes reales a tu nombre.">
    <meta name="twitter:image" content="https://tudominio.com/img/og-share.jpg">
</head>
<body>
<!-- El contenido HTML continúa en el body... -->
</body>
</html>
