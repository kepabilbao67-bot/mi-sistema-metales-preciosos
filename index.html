<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
    <!-- ============================================
         METADATOS BÁSICOS SEO
         Esto es lo que Google lee para posicionarte
    ============================================= -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- TÍTULO SEO: Máximo 60 caracteres. Incluye palabra clave principal -->
    <title>Ahorra en Oro Físico desde 25€/mes | Plan de Ahorro en Oro España</title>
    
    <!-- META DESCRIPCIÓN: Máximo 155 caracteres. Es lo que sale en Google debajo del título -->
    <meta name="description" content="Plan de ahorro en oro físico desde 25€/mes. Lingotes reales a tu nombre en Zúrich. +144% en 5 años. Sin permanencia. Empresa alemana con +200.000 inversores.">
    
    <!-- PALABRAS CLAVE: Google ya no las usa mucho, pero otros buscadores sí -->
    <meta name="keywords" content="ahorro en oro, oro físico, plan ahorro oro, comprar oro España, inversión oro, lingotes oro, AUVESTA, oro Zúrich, proteger patrimonio, oro sin IVA">
    
    <!-- AUTOR -->
    <meta name="author" content="OroParaTuFuturo">
    
    <!-- ROBOTS: Decimos a Google que indexe y siga los enlaces -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
    
    <!-- CANONICAL: Evita contenido duplicado. Pon tu URL real -->
    <link rel="canonical" href="https://tudominio.com/">

    <!-- ============================================
         OPEN GRAPH (Facebook, WhatsApp, LinkedIn)
         Esto controla cómo se ve cuando compartes tu web
    ============================================= -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Ahorra en Oro Físico desde 25€/mes">
    <meta property="og:description" content="El oro ha subido +144% en 5 años. Protege tu patrimonio con lingotes reales a tu nombre. Sin permanencia. Empresa alemana.">
    <meta property="og:url" content="https://tudominio.com/">
    <meta property="og:site_name" content="OroParaTuFuturo">
    <meta property="og:locale" content="es_ES">
    <!-- Pon aquí una imagen de 1200x630px para compartir -->
    <meta property="og:image" content="https://tudominio.com/og-image.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- ============================================
         TWITTER CARD
         Cómo se ve cuando lo comparten en Twitter/X
    ============================================= -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ahorra en Oro Físico desde 25€/mes">
    <meta name="twitter:description" content="El oro ha subido +144% en 5 años. Lingotes reales a tu nombre.">
    <meta name="twitter:image" content="https://tudominio.com/og-image.jpg">

    <!-- ============================================
         SCHEMA.ORG (Datos estructurados)
         Ayuda a Google a entender tu web y mostrar
         resultados enriquecidos (estrellas, FAQ, etc.)
    ============================================= -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "FinancialService",
        "name": "OroParaTuFuturo — Ahorro en Oro Físico",
        "description": "Plan de ahorro en oro físico desde 25€/mes. Lingotes reales con número de serie almacenados en cámaras de alta seguridad.",
        "url": "https://tudominio.com/",
        "areaServed": "ES",
        "serviceType": "Plan de ahorro en metales preciosos",
        "provider": {
            "@type": "Organization",
            "name": "AUVESTA Edelmetalle AG",
            "foundingDate": "2009",
            "address": {
                "@type": "PostalAddress",
                "addressLocality": "Holzkirchen",
                "addressCountry": "DE"
            }
        }
    }
    </script>

    <!-- Schema FAQ: Google puede mostrar tus preguntas directamente en resultados -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
            {
                "@type": "Question",
                "name": "¿Cuánto necesito para empezar a ahorrar en oro?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Con la tarifa S-3 solo necesitas una entrada de 300€ y después puedes ahorrar desde 25€/mes. No hay obligación de compra mensual."
                }
            },
            {
                "@type": "Question",
                "name": "¿El oro es realmente mío?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Sí, 100%. Cada lingote tiene un número de serie único asignado legalmente a tu nombre. Puedes pedir que te lo envíen a casa."
                }
            },
            {
                "@type": "Question",
                "name": "¿Pago IVA al comprar oro en España?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "No. El oro de inversión está exento de IVA en toda la Unión Europea por la Directiva 2006/112/CE."
                }
            },
            {
                "@type": "Question",
                "name": "¿Puedo vender mi oro cuando quiera?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Sí. Puedes vender online en cualquier momento a precio de mercado. Sin plazos de preaviso ni penalizaciones."
                }
            }
        ]
    }
    </script>

    <!-- ============================================
         RENDIMIENTO Y VELOCIDAD
    ============================================= -->
    <!-- Preconectar a Google Fonts para cargar más rápido -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Cargar fuente con display=swap (la web se ve mientras carga la fuente) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- CSS principal -->
    <link rel="stylesheet" href="styles.css">

    <!-- Favicon (pon un icono .ico o .png en tu carpeta) -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <!-- Tema para móviles (color de la barra superior) -->
    <meta name="theme-color" content="#1a1a2e">
    
    <!-- =============================================
    ✅ SCRIPTS DE INTEGRACIÓN (cargan al final del body)
    - error-handler.js: Arregla fallos automáticamente
    - app-integration.js: Conecta con tu app de captación
    - chatbot-ia.js: El chatbot con IA para preguntas
    ============================================== -->
</head>
<body>
    <!-- =============================================
    🏗️ ESTRUCTURA DE LA WEB (resumen):
    1. HEADER - Menú de navegación fijo arriba
    2. HERO - Primera pantalla con datos impactantes
    3. TRUST BAR - Barra de confianza
    4. PROBLEMA/SOLUCIÓN - Por qué necesitan oro
    5. CÓMO FUNCIONA - 3 pasos
    6. VENTAJAS - 8 beneficios
    7. RENDIMIENTO - Gráficas y datos
    8. PLANES - Las 4 tarifas
    9. CALCULADORA - Interactiva
    10. SEGURIDAD - Garantías
    11. FAQ - Preguntas frecuentes
    12. CONTACTO - Formulario + WhatsApp
    13. FOOTER - Pie de página
    14. CHATBOT IA - Asistente flotante
    ============================================== -->

    <!-- NOTA: Para la estructura HTML completa, ver el archivo
         original. Este archivo se centra en el <head> SEO
         y la integración con la app + error handler.
         
         Copia el contenido del <body> del index.html anterior
         aquí y añade al final antes de </body>: -->

    <!-- =============================================
    📜 SCRIPTS (siempre al final del body para velocidad)
    ============================================== -->
    
    <!-- 1. Arreglador de fallos - SIEMPRE primero -->
    <script src="error-handler.js"></script>
    
    <!-- 2. Integración con tu app de captación -->
    <script src="app-integration.js"></script>
    
    <!-- 3. Chatbot con IA (incluye calculadora y FAQ) -->
    <script src="chatbot-ia.js"></script>
    
    <!-- 4. Analytics (Google Analytics - opcional) -->
    <!-- Descomenta y pon tu ID cuando lo tengas:
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}

</body>
</html>
